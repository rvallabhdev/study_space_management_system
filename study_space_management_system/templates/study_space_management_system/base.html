<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Flatpickr CSS for calendar date picker-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <!-- Flatpickr JS for calendar date picker-->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <title>{% block title %}Study Space Management System{% endblock %}</title>
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <!-- Include navbar from components folder -->
    {% include 'study_space_management_system/components/navbar.html' %}
    
    <main class="container mt-4">
      <!-- Include reusable alerts component -->
      {% include 'study_space_management_system/components/alerts.html' %}
      
      <!-- Main content block -->
      {% block content %}
      {% endblock %}
    </main>
    
    <!-- Bootstrap 5 JavaScript Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
